<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Compartido sin BD</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #f8fafc;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        h1 { text-align: center; color: #60a5fa; margin-top: 0; }

        .share-section {
            background: #1e293b;
            border: 2px dashed #3b82f6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            text-align: center;
        }

        .task-form {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 20px;
        }

        input, button {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0f172a;
            color: white;
            font-size: 14px;
        }

        input:focus {
            outline: 2px solid var(--primary);
        }

        button {
            background: var(--primary);
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        button:hover { background: var(--primary-hover); }

        .btn-share {
            background: #10b981;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn-share:hover { background: #059669; }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: #64748b;
        }

        .task-info { display: flex; flex-direction: column; gap: 4px; }
        .task-title { font-weight: bold; font-size: 16px; }
        .task-meta { font-size: 12px; color: #94a3b8; }

        .actions { display: flex; gap: 5px; }
        .btn-action { padding: 6px 10px; font-size: 12px; }
        .btn-del { background: #ef4444; }
        .btn-del:hover { background: #dc2626; }
    </style>
</head>
<body>

<div class="container">
    <h1>🗓️ Calendario Grupal URL</h1>

    <div class="share-section">
        <p style="margin: 0 0 10px 0; font-size: 14px; color: #94a3b8;">
            Cada vez que hagas cambios, haz clic abajo para generar un nuevo enlace y compártelo con tu equipo.
        </p>
        <button class="btn-share" onclick="generateShareLink()">🔗 Copiar Enlace Actualizado</button>
    </div>

    <div class="task-form">
        <input type="text" id="taskName" placeholder="¿Qué se hará?" required>
        <input type="text" id="taskUser" placeholder="¿Quién?" required>
        <input type="date" id="taskDate" required>
        <button onclick="addTask()">+</button>
    </div>

    <div class="task-list" id="taskList"></div>
</div>

<script>
    let tasks = [];

    // 1. Cargar tareas desde la URL (si existen) al abrir la página
    function loadTasksFromURL() {
        const urlParams = new URLSearchParams(window.location.search);
        const data = urlParams.get('data');
        if (data) {
            try {
                // Desencriptamos la información de la URL de forma segura
                tasks = JSON.parse(atob(data));
            } catch (e) {
                console.error("Error al leer los datos de la URL", e);
                tasks = [];
            }
        }
        render();
    }

    // 2. Renderizar tareas
    function render() {
        const container = document.getElementById('taskList');
        container.innerHTML = '';

        tasks.sort((a,b) => new Date(a.date) - new Date(b.date));

        if(tasks.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#64748b;">No hay eventos. Añade uno arriba.</p>';
            return;
        }

        tasks.forEach((task, index) => {
            const div = document.createElement('div');
            div.className = `task-item ${task.completed ? 'completed' : ''}`;
            
            const dateObj = new Date(task.date + 'T00:00:00');
            const formattedDate = dateObj.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });

            div.innerHTML = `
                <div class="task-info">
                    <span class="task-title">${task.text}</span>
                    <span class="task-meta">📅 ${formattedDate} | 👤 ${task.user}</span>
                </div>
                <div class="actions">
                    <button class="btn-action" onclick="toggleTask(${index})">✓</button>
                    <button class="btn-action btn-del" onclick="deleteTask(${index})">🗑️</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function addTask() {
        const text = document.getElementById('taskName').value;
        const user = document.getElementById('taskUser').value;
        const date = document.getElementById('taskDate').value;

        if(!text || !user || !date) return alert('Llena todos los campos');

        tasks.push({ text, user, date, completed: false });
        render();

        document.getElementById('taskName').value = '';
        document.getElementById('taskUser').value = '';
        document.getElementById('taskDate').value = '';
    }

    function toggleTask(index) {
        tasks[index].completed = !tasks[index].completed;
        render();
    }

    function deleteTask(index) {
        tasks.splice(index, 1);
        render();
    }

    // 3. Generar enlace con los datos encriptados en base64
    function generateShareLink() {
        const base64Data = btoa(JSON.stringify(tasks));
        const newURL = `${window.location.origin}${window.location.pathname}?data=${base64Data}`;
        
        navigator.clipboard.writeText(newURL).then(() => {
            alert('¡Enlace copiado al portapapeles! Envíalo a tu grupo para que vean los cambios.');
        });
    }

    // Arrancar la app leyendo la URL
    loadTasksFromURL();
</script>
</body>
</html>
