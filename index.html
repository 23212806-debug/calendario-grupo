<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Guerrilleros del Amor</title>
    <style>
        :root {
            --bg: #0b0f19;
            --card: #151d30;
            --card-hover: #1e2942;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #f43f5e;
            --danger-hover: #e11d48;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #24324f;
        }

        /* Reset básico */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 750px;
            width: 100%;
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            align-self: flex-start;
            margin-top: 20px;
        }

        @media (min-width: 600px) {
            .container {
                padding: 30px;
                margin-top: 40px;
            }
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.8rem;
            color: #60a5fa;
            margin: 0 0 10px 0;
            text-align: center;
        }

        /* Sección de compartir */
        .share-banner {
            background: rgba(59, 130, 246, 0.05);
            border: 2px dashed var(--primary);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
        }

        .share-text {
            margin: 0 0 12px 0;
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .btn-share {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-share:hover {
            background: var(--success-hover);
        }

        /* Formulario responsivo */
        .task-form {
            background: rgba(0, 0, 0, 0.15);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-inputs {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0b0f19;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .btn-add:hover {
            background: var(--primary-hover);
        }

        @media (min-width: 650px) {
            .task-form {
                flex-direction: row;
                align-items: center;
                padding: 15px;
            }

            .form-inputs {
                flex-direction: row;
                flex: 1;
            }

            .form-inputs input {
                flex: 1;
            }

            .btn-add {
                width: auto;
                padding: 12px 20px;
                font-size: 1.2rem;
            }
        }

        /* Lista de Tareas */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .task-item:hover {
            background: var(--card-hover);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .task-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-grow: 1;
            padding-right: 15px;
        }

        .task-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.3;
        }

        .task-details {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .badge-user {
            background: rgba(147, 197, 253, 0.1);
            color: #93c5fd;
            padding: 1px 6px;
            border-radius: 6px;
            font-weight: 500;
        }

        .task-item.completed {
            opacity: 0.5;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* Acciones */
        .actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-action {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        .btn-complete {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }
        .btn-complete:hover {
            background: var(--success);
            color: white;
        }

        .btn-delete {
            background: rgba(244, 63, 94, 0.1);
            color: var(--danger);
        }
        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 30px 10px;
            font-style: italic;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Calendario Guerrilleros del Amor</h1>
    </header>

    <div class="share-banner">
        <p class="share-text">Cada vez que hagas cambios, haz clic abajo para generar un nuevo enlace y compártelo con tu equipo.</p>
        <button class="btn-share" onclick="generateShareLink()">🔗 Copiar Enlace Actualizado</button>
    </div>

    <!-- Formulario Dinámico y Ajustable -->
    <div class="task-form">
        <div class="form-inputs">
            <input type="text" id="taskName" placeholder="¿Qué se hará?" required>
            <input type="text" id="taskUser" placeholder="¿Quién?" required>
            <!-- Ahora es tipo text para permitir rangos de fechas de forma libre -->
            <input type="text" id="taskDate" placeholder="Fecha (Ej: 12-15 Oct, Lunes...)" required>
        </div>
        <button class="btn-add" onclick="addTask()">+</button>
    </div>

    <div class="task-list" id="taskList"></div>
</div>

<script>
    let tasks = [];

    function loadTasksFromURL() {
        const urlParams = new URLSearchParams(window.location.search);
        const data = urlParams.get('data');
        if (data) {
            try {
                // Desencriptación segura
                tasks = JSON.parse(decodeURIComponent(escape(atob(data))));
            } catch (e) {
                console.error("Error al leer los datos", e);
                tasks = [];
            }
        }
        render();
    }

    function render() {
        const container = document.getElementById('taskList');
        container.innerHTML = '';

        if(tasks.length === 0) {
            container.innerHTML = '<p class="empty-state">No hay actividades. Añade una arriba.</p>';
            return;
        }

        tasks.forEach((task, index) => {
            const div = document.createElement('div');
            div.className = `task-item ${task.completed ? 'completed' : ''}`;
            
            div.innerHTML = `
                <div class="task-content">
                    <span class="task-title">${task.text}</span>
                    <div class="task-details">
                        <span class="detail-item">📅 ${task.date}</span>
                        <span class="detail-item">👤 <span class="badge-user">${task.user}</span></span>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn-action btn-complete" onclick="toggleTask(${index})">✓</button>
                    <button class="btn-action btn-delete" onclick="deleteTask(${index})">🗑️</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function addTask() {
        const text = document.getElementById('taskName').value.trim();
        const user = document.getElementById('taskUser').value.trim();
        const date = document.getElementById('taskDate').value.trim();

        if(!text || !user || !date) {
            alert('Por favor, completa todos los campos.');
            return;
        }

        tasks.push({ text, user, date, completed: false });
        render();

        document.getElementById('taskName').value = '';
        document.getElementById('taskUser').value = '';
        document.getElementById('taskDate').value = '';
    }

    function toggleTask(index) {
        tasks[index].completed = !tasks[index].completed;
        render();
    }

    function deleteTask(index) {
        if(confirm('¿Seguro que deseas borrar esta tarea?')) {
            tasks.splice(index, 1);
            render();
        }
    }

    function generateShareLink() {
        // Codificamos en UTF-8 y Base64 para que soporte acentos y caracteres especiales perfectamente
        const base64Data = btoa(unescape(encodeURIComponent(JSON.stringify(tasks))));
        const newURL = `${window.location.origin}${window.location.pathname}?data=${base64Data}`;
        
        navigator.clipboard.writeText(newURL).then(() => {
            alert('¡Enlace actualizado copiado con éxito! Envíalo por WhatsApp a tu grupo.');
        }).catch(() => {
            alert('Error al copiar. Copia directamente la dirección de tu navegador.');
        });
    }

    loadTasksFromURL();
</script>
</body>
</html>
