<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario del Grupo</title>
    <style>
        :root {
            --bg: #0b0f19;
            --card: #151d30;
            --card-hover: #1e2942;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #f43f5e;
            --danger-hover: #e11d48;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #24324f;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 750px;
            width: 100%;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            color: #60a5fa;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.95rem;
        }

        /* Sección de compartir */
        .share-banner {
            background: rgba(59, 130, 246, 0.1);
            border: 1px dashed var(--primary);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
        }

        .btn-share {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn-share:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* Formulario de entrada */
        .task-form {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        @media (min-width: 600px) {
            .form-grid {
                grid-template-columns: 2fr 1.2fr 1.2fr;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            padding: 12px;
            background: #0b0f19;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-add {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .btn-add:hover {
            background: var(--success-hover);
        }

        /* Lista de Tareas / Calendario */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .task-item:hover {
            background: var(--card-hover);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateX(2px);
        }

        .task-content {
            display: flex;
            flex-direction: column;
            gap: 8px; /* Espacio entre el título y la info de abajo */
            flex-grow: 1;
            padding-right: 15px;
        }

        .task-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.3;
        }

        /* LA FECHA Y EL ENCARGADO UNA LÍNEA ABAJO */
        .task-details {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .badge-user {
            background: rgba(59, 130, 246, 0.15);
            color: #93c5fd;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 500;
        }

        /* Estilo cuando está completado */
        .task-item.completed {
            opacity: 0.6;
            border-color: rgba(16, 185, 129, 0.2);
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* Botones de acción */
        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.1rem;
        }

        .btn-complete {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }
        .btn-complete:hover {
            background: var(--success);
            color: white;
        }

        .btn-delete {
            background: rgba(244, 63, 94, 0.1);
            color: var(--danger);
        }
        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🗓️ Calendario Grupal Dinámico</h1>
        <p class="subtitle">Organiza tareas, asigna encargados y comparte los cambios al instante.</p>
    </header>

    <!-- Sección para compartir la URL -->
    <div class="share-banner">
        <button class="btn-share" onclick="generateShareLink()">🔗 Generar y Copiar Enlace Actualizado</button>
    </div>

    <!-- Formulario -->
    <div class="task-form">
        <div class="form-grid">
            <div class="input-group">
                <label for="taskName">¿Qué se hará?</label>
                <input type="text" id="taskName" placeholder="Ej. Entregar reporte, Exposición..." required>
            </div>
            <div class="input-group">
                <label for="taskUser">Encargado(a)</label>
                <input type="text" id="taskUser" placeholder="Ej. Carlos, Todo el equipo" required>
            </div>
            <div class="input-group">
                <label for="taskDate">Fecha límite</label>
                <input type="date" id="taskDate" required>
            </div>
        </div>
        <button class="btn-add" onclick="addTask()">+ Agregar al Calendario</button>
    </div>

    <!-- Lista de Tareas -->
    <div class="task-list" id="taskList">
        <!-- Las tareas se inyectarán aquí dinámicamente -->
    </div>
</div>

<script>
    let tasks = [];

    // Cargar datos al iniciar
    function loadTasksFromURL() {
        const urlParams = new URLSearchParams(window.location.search);
        const data = urlParams.get('data');
        if (data) {
            try {
                // Desencriptamos de Base64
                tasks = JSON.parse(atob(data));
            } catch (e) {
                console.error("Error cargando los datos de la URL", e);
                tasks = [];
            }
        }
        render();
    }

    // Dibujar elementos en pantalla
    function render() {
        const container = document.getElementById('taskList');
        container.innerHTML = '';

        // Ordenar por fecha (más cercanas primero)
        tasks.sort((a,b) => new Date(a.date) - new Date(b.date));

        if(tasks.length === 0) {
            container.innerHTML = '<p class="empty-state">No hay actividades registradas en el calendario. ¡Agrega una nueva arriba!</p>';
            return;
        }

        tasks.forEach((task, index) => {
            const div = document.createElement('div');
            div.className = `task-item ${task.completed ? 'completed' : ''}`;
            
            // Formatear fecha para que sea más legible
            const dateObj = new Date(task.date + 'T00:00:00');
            const formattedDate = dateObj.toLocaleDateString('es-ES', { 
                weekday: 'long', 
                day: 'numeric', 
                month: 'short' 
            });

            // ESTRUCTURA: Título arriba, fecha y encargado abajo
            div.innerHTML = `
                <div class="task-content">
                    <span class="task-title">${task.text}</span>
                    <div class="task-details">
                        <span class="detail-item">📅 ${formattedDate}</span>
                        <span class="detail-item">👤 <span class="badge-user">${task.user}</span></span>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn-action btn-complete" title="Marcar como completado" onclick="toggleTask(${index})">✓</button>
                    <button class="btn-action btn-delete" title="Eliminar" onclick="deleteTask(${index})">🗑️</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // Agregar nueva actividad
    function addTask() {
        const text = document.getElementById('taskName').value.trim();
        const user = document.getElementById('taskUser').value.trim();
        const date = document.getElementById('taskDate').value;

        if(!text || !user || !date) {
            alert('Por favor, completa todos los campos.');
            return;
        }

        tasks.push({ text, user, date, completed: false });
        render();

        // Limpiar campos
        document.getElementById('taskName').value = '';
        document.getElementById('taskUser').value = '';
        document.getElementById('taskDate').value = '';
    }

    // Marcar completado (tachar)
    function toggleTask(index) {
        tasks[index].completed = !tasks[index].completed;
        render();
    }

    // Eliminar
    function deleteTask(index) {
        if(confirm('¿Deseas eliminar esta actividad de la lista?')) {
            tasks.splice(index, 1);
            render();
        }
    }

    // Generar enlace
    function generateShareLink() {
        // Encriptamos la lista en Base64 para pasarla por la URL de forma segura
        const base64Data = btoa(unescape(encodeURIComponent(JSON.stringify(tasks))));
        const newURL = `${window.location.origin}${window.location.pathname}?data=${base64Data}`;
        
        navigator.clipboard.writeText(newURL).then(() => {
            alert('¡Enlace actualizado copiado con éxito! Envíalo a tu equipo por chat.');
        }).catch(err => {
            console.error('Error al copiar', err);
            alert('No se pudo copiar automáticamente. Copia la URL de tu navegador.');
        });
    }

    // Inicializar la página leyendo la URL
    loadTasksFromURL();
</script>
</body>
</html>
